# Compose version key is obsolete in v2+; removed for clarity

services:
  postgres:
    image: postgres:15-alpine
    container_name: easyflow_postgres
    environment:
      POSTGRES_DB: easyflow
      POSTGRES_USER: easyflow
      POSTGRES_PASSWORD: easyflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U easyflow -d easyflow"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: easyflow_redis
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: easyflow_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: easyflow_kafka
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easyflow_backend
    environment:
      NODE_ENV: test
      PORT: 3030
      HOST: 0.0.0.0
      DATABASE_URL: "postgres://easyflow:easyflow@postgres:5432/easyflow"
      REDIS_URL: "redis://redis:6379"
      KAFKA_BROKERS: "kafka:9092"
      AUTOMATION_URL: "http://automation-worker:7001"
      ALLOW_DRAFT_EXECUTION: 'true'
      SUPABASE_URL: "http://localhost"
      SUPABASE_SERVICE_ROLE: "test_key"
      SUPABASE_ANON_KEY: "test_key"
      CREDENTIAL_ENCRYPTION_KEY: "test_encryption_key_32_characters_long"
      SESSION_SECRET: "test_session_secret"
      ADMIN_API_SECRET: "test_admin_secret"
      NEW_RELIC_ENABLED: 'false'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
    ports:
      - "3030:3030"

  automation-worker:
    build:
      context: ./automation
      dockerfile: automation-service/Dockerfile
    container_name: easyflow_automation
    environment:
      AUTOMATION_WORKER_MODE: local
      BACKEND_URL: "http://backend:3030"
      KAFKA_BROKERS: kafka:9092
    depends_on:
      backend:
        condition: service_started
      kafka:
        condition: service_started
      postgres:
        condition: service_healthy
    ports:
      - "7001:7001"

  dashboard:
    build:
      context: ./rpa-dashboard
      dockerfile: Dockerfile
    container_name: easyflow_dashboard
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:3000"

networks:
  default:
    name: easyflow_test_net
